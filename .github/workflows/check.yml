name: Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Typecheck and build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Audit runtime deps
        run: npm audit --omit=dev --audit-level=moderate
